---
apiVersion: v1alpha1
kind: AgentConfig
metadata:
  name: ibi-proxy
rendezvousIP: 192.168.132.31
hosts:
  - hostname: ibi-proxy-node-1
    interfaces:
      - name: enp1s0
        macAddress: 52:54:00:c0:84:31
    networkConfig:
      interfaces:
        - name: enp1s0
          type: ethernet
          state: up
          mac-address: 52:54:00:c0:84:31
          ipv4:
            enabled: True
            dhcp: True
          ipv6:
            enabled: False
    rootDeviceHints:
      deviceName: "/dev/vda"
