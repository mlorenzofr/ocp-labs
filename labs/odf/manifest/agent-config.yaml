---
apiVersion: v1alpha1
kind: AgentConfig
metadata:
  name: odf
rendezvousIP: 192.168.125.11
hosts:
  - hostname: odf-node-1
    interfaces:
      - name: eth0
        macAddress: be:be:ca:fe:03:11
    networkConfig:
      interfaces:
        - name: eth0
          type: ethernet
          state: up
          mac-address: be:be:ca:fe:03:11
          ipv4:
            enabled: True
            dhcp: True
          ipv6:
            enabled: False
    rootDeviceHints:
      deviceName: "/dev/vda"
  - hostname: odf-node-2
    interfaces:
      - name: eth0
        macAddress: be:be:ca:fe:03:12
    networkConfig:
      interfaces:
        - name: eth0
          type: ethernet
          state: up
          mac-address: be:be:ca:fe:03:12
          ipv4:
            enabled: True
            dhcp: True
          ipv6:
            enabled: False
    rootDeviceHints:
      deviceName: "/dev/vda"
  - hostname: odf-node-3
    interfaces:
      - name: eth0
        macAddress: be:be:ca:fe:03:13
    networkConfig:
      interfaces:
        - name: eth0
          type: ethernet
          state: up
          mac-address: be:be:ca:fe:03:13
          ipv4:
            enabled: True
            dhcp: True
          ipv6:
            enabled: False
    rootDeviceHints:
      deviceName: "/dev/vda"
