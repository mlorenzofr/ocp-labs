---
# Execution example:
#
# $ ansible-playbook acm-import-cluster.yaml \
#     -e lab_name=acm \
#     -e cluster=cluster-abi \
#     -e kubeconfig=/root/labs/abi/deploy/auth/kubeconfig
#     -e governance=true

- name: 'Import cluster to ACM'
  hosts:
    - 'lab'

  gather_facts: false

  vars:
    lab_path: '/root/labs'

  environment:
    PATH: '/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin'
    KUBECONFIG: "{{ lab_path }}/{{ lab_name }}/deploy/auth/kubeconfig"

  tasks:
    - name: 'Test lab_name'
      ansible.builtin.fail:
        msg: 'Variable lab_name is empty'
      when: lab_name | length == 0

    - name: 'Test cluster'
      ansible.builtin.fail:
        msg: 'Variable cluster is empty'
      when: cluster | length == 0

    - name: 'Test kubeconfig'
      ansible.builtin.fail:
        msg: 'Variable kubeconfig is empty'
      when: kubeconfig | length == 0

    - name: 'Create import directory'
      ansible.builtin.file:
        path: "{{ lab_path }}/{{ lab_name }}/import"
        mode: '0750'
        state: 'directory'

    - name: 'Import external cluster'
      ansible.builtin.import_role:
        name: 'ocp_acm'
        tasks_from: 'import.yaml'
      vars:
        cwd: "{{ lab_path }}/{{ lab_name }}/{{ cluster }}/import"
